name: CD Pipeline

on:
  push:
    branches: [ "master" ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push-images:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/api-server
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/worker
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/whatsapp-bot
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/web

      - name: Build and push API Server
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/api/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/api-server:latest
          labels: ${{ steps.meta.outputs.labels }}

      - name: Build and push Worker
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/worker/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/worker:latest
          labels: ${{ steps.meta.outputs.labels }}

      - name: Build and push WhatsApp Bot
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/whatsapp/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/whatsapp-bot:latest
          labels: ${{ steps.meta.outputs.labels }}

      - name: Build and push Web (Nginx)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/web/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/web:latest
          labels: ${{ steps.meta.outputs.labels }}

  deploy:
    needs: build-and-push-images
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /home/azureuser/NirnayAI
            # Ensure the server is authenticated with GHCR to pull images
            echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            
            # Pull the latest code (for docker-compose.yml changes)
            git pull origin master
            
            # Pull the latest images
            docker compose pull
            
            # Restart services
            docker compose up -d
            
            # Clean up old unused images
            docker image prune -f
