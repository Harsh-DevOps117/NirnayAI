worker_processes 1;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile        on;
    keepalive_timeout  65;

    # Rate limiting (increased to safely support React UI asset loading)
    limit_req_zone $binary_remote_addr zone=mylimit:10m rate=20r/s;

    server {
        listen 80;
        server_name localhost;

        # Max upload size for APKs (e.g., 200MB)
        client_max_body_size 200M;

        # Frontend React App (Served statically)
        location / {
            limit_req zone=mylimit burst=50 nodelay;
            root   /usr/share/nginx/html;
            index  index.html index.htm;
            try_files $uri $uri/ /index.html;
        }

        # Backend API Reverse Proxy
        location /api/ {
            limit_req zone=mylimit burst=50 nodelay;
            proxy_pass http://api-server:3000;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
        }

        # Healthcheck endpoint
        location /health {
            proxy_pass http://api-server:3000/health;
        }
    }
}
