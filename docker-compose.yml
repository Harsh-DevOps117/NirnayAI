version: "3.8"

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: nirnay
      POSTGRES_PASSWORD: nirnaypassword
      POSTGRES_DB: nirnayai
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nirnay -d nirnayai"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data

  mobsf:
    image: opensecurity/mobile-security-framework-mobsf:latest
    ports:
      - "8000:8000"
    environment:
      - MOBSF_API_KEY=${MOBSF_API_KEY}
      - MOBSF_ANALYZER_IDENTIFIER=android-sandbox-1:5555
    volumes:
      - mobsfdata:/home/mobsf/.MobSF

  android-sandbox-1:
    image: us-docker.pkg.dev/android-emulator-268719/images/30-google-x64:latest
    privileged: true
    shm_size: "2gb"
    devices:
      - /dev/kvm:/dev/kvm
    environment:
      - WEB_VNC=true
    ports:
      - "5555:5555"



  nginx:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    ports:
      - "80:80"
    depends_on:
      - api-server

  api-server:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    ports:
      - "3000:3000"
    env_file:
      - .env
    volumes:
      - uploadsdata:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  worker:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    env_file:
      - .env
    volumes:
      - uploadsdata:/app/uploads
    depends_on:
      - redis
      - mobsf

  whatsapp-bot:
    build:
      context: .
      dockerfile: apps/whatsapp/Dockerfile
    env_file:
      - .env
    environment:
      - API_URL=http://api-server:3000/api/v1
    depends_on:
      - redis
      - api-server
    volumes:
      - whatsappdata:/app/auth_info_baileys

volumes:
  pgdata:
  redisdata:
  mobsfdata:
  uploadsdata:
  whatsappdata:
